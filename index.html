<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KaDo Clothing 🥑 | Wholesale Fashion Hub</title>
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            font-family: 'Inter', sans-serif;
            color: #fff;
            scroll-behavior: smooth;
        }

        /* animated background with yellow accents */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 20% 30%, #0f0f0f 0%, #000000 100%);
        }

        .bg-gradient::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: repeating-linear-gradient(45deg, rgba(255,215,0,0.035) 0px, rgba(255,215,0,0.035) 2px, transparent 2px, transparent 12px);
            animation: drift 45s linear infinite;
            pointer-events: none;
        }

        @keyframes drift {
            0% { transform: translate(0,0) rotate(0deg);}
            100% { transform: translate(80px, 60px) rotate(6deg);}
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 2rem 3rem;
        }

        /* header with avocado branding */
        .hero {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeSlideDown 0.8s cubic-bezier(0.2, 0.9, 0.3, 1.1);
        }

        .hero h1 {
            font-size: 3.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #FFE174 0%, #FFC107 60%, #F9B81B 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .hero h1 i {
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: #FFD966;
            font-size: 3rem;
        }

        .tagline {
            font-size: 1.2rem;
            color: #e0e0e0;
            margin-top: 0.8rem;
            font-weight: 500;
            border-bottom: 1px solid rgba(255,215,0,0.4);
            display: inline-block;
            padding-bottom: 0.3rem;
        }

        /* WhatsApp banner CTA */
        .whatsapp-cta {
            background: linear-gradient(95deg, rgba(37, 211, 102, 0.2), rgba(0,0,0,0.7));
            backdrop-filter: blur(12px);
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            padding: 0.7rem 2rem;
            margin-top: 1.2rem;
            border: 1px solid rgba(37, 211, 102, 0.6);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .whatsapp-cta i {
            font-size: 1.8rem;
            color: #25D366;
        }
        
        .whatsapp-cta span {
            font-weight: 700;
            font-size: 1.1rem;
            color: white;
        }
        
        .whatsapp-cta small {
            font-size: 0.8rem;
            opacity: 0.8;
        }
        
        .whatsapp-cta:hover {
            transform: scale(1.02);
            background: rgba(37, 211, 102, 0.3);
            border-color: #25D366;
            box-shadow: 0 0 15px rgba(37,211,102,0.4);
        }

        /* stats row */
        .stats-row {
            display: flex;
            justify-content: space-between;
            gap: 1.5rem;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            padding: 1rem 2rem;
            margin: 2rem 0 2.5rem;
            border: 1px solid rgba(255,215,0,0.35);
            flex-wrap: wrap;
        }

        .stat-card {
            flex: 1;
            text-align: center;
            padding: 0.8rem;
            transition: all 0.2s;
        }
        .stat-card i {
            font-size: 2rem;
            color: #FFD966;
            margin-bottom: 0.5rem;
        }
        .stat-number {
            font-size: 2.2rem;
            font-weight: 800;
            color: #FFD966;
            letter-spacing: 1px;
        }
        .stat-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            font-weight: 600;
            color: #ccc;
        }

        /* filter bar */
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: rgba(20,20,20,0.85);
            backdrop-filter: blur(8px);
            border: 1px solid #333;
            padding: 0.7rem 1.6rem;
            border-radius: 60px;
            font-weight: 600;
            color: #eee;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }
        .filter-btn i {
            margin-right: 0.5rem;
            color: #FFD966;
        }
        .filter-btn.active {
            background: #FFD966;
            color: #000;
            border-color: #FFD966;
            box-shadow: 0 0 14px rgba(255,217,102,0.5);
        }
        .filter-btn.active i {
            color: #000;
        }
        .filter-btn:hover:not(.active) {
            background: #2a2a2a;
            border-color: #FFD966;
            transform: translateY(-3px);
        }

        /* product grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: rgba(10,10,10,0.85);
            backdrop-filter: blur(5px);
            border-radius: 2rem;
            overflow: hidden;
            transition: all 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255,255,255,0.08);
            transform: translateY(0);
            animation: cardReveal 0.55s ease backwards;
            cursor: pointer;
        }
        .product-card:hover {
            transform: translateY(-12px) scale(1.01);
            border-color: rgba(255,215,0,0.6);
            box-shadow: 0 28px 35px -12px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,215,0,0.25);
        }

        .img-container {
            width: 100%;
            height: 260px;
            overflow: hidden;
            background: #1a1a1a;
            position: relative;
        }
        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease, filter 0.3s;
        }
        .product-card:hover .product-img {
            transform: scale(1.08);
            filter: brightness(1.05);
        }

        .stock-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(5px);
            padding: 0.35rem 1rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.8rem;
            border-left: 3px solid #FFD966;
            color: #FFD966;
            z-index: 2;
        }
        .low-stock { color: #ffaa44; border-left-color: #ffaa44; }
        .out-stock { color: #ff8888; border-left-color: #ff8888; }

        .product-info {
            padding: 1.2rem 1.2rem 1.5rem;
        }
        .product-title {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.2px;
            color: #fff;
        }
        .product-category {
            display: inline-block;
            background: rgba(255,215,0,0.15);
            padding: 0.2rem 0.9rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #FFD966;
            margin: 0.6rem 0 0.8rem;
        }
        .stock-count {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: rgba(255,255,255,0.03);
            padding: 0.6rem 0.8rem;
            border-radius: 1rem;
            font-weight: 600;
        }
        .stock-value {
            font-size: 1rem;
            color: #FFD966;
            font-weight: 800;
        }
        .stock-bar-bg {
            flex: 1;
            height: 6px;
            background: #2c2c2c;
            border-radius: 10px;
            overflow: hidden;
        }
        .stock-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #FFD966, #f7b42c);
            border-radius: 10px;
            transition: width 0.5s ease-out;
        }

        /* animations */
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-35px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulseYellow {
            0% { text-shadow: 0 0 0px rgba(255,217,102,0);}
            50% { text-shadow: 0 0 6px rgba(255,217,102,0.6);}
            100% { text-shadow: 0 0 0px rgba(255,217,102,0);}
        }
        .warning-pulse {
            animation: pulseYellow 1.2s infinite;
        }

        footer {
            margin-top: 4rem;
            text-align: center;
            font-size: 0.8rem;
            color: #aaa;
            border-top: 1px solid rgba(255,215,0,0.2);
            padding-top: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .footer-wa {
            background: rgba(37,211,102,0.1);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
        }
        .footer-wa a {
            color: #25D366;
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 700px) {
            .container { padding: 1rem; }
            .hero h1 { font-size: 2.2rem; }
            .hero h1 i { font-size: 2rem; }
            .stat-number { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="container">
    <div class="hero">
        <h1>
            KaDo Clothing 🥑
            <i class="fas fa-leaf"></i>
        </h1>
        <div class="tagline">Wholesale Fashion — Fresh Stock, Premium Quality</div>
        <!-- WhatsApp Group Button -->
        <a href="https://chat.whatsapp.com/B7ahsbtptn714SlVZST99c" target="_blank" rel="noopener noreferrer" style="text-decoration: none;">
            <div class="whatsapp-cta">
                <i class="fab fa-whatsapp"></i>
                <span>Join Wholesale WhatsApp Group</span>
                <small><i class="fas fa-arrow-right"></i> Bulk Orders & Offers</small>
            </div>
        </a>
    </div>

    <!-- Stats section -->
    <div class="stats-row" id="statsPanel">
        <div class="stat-card"><i class="fas fa-tshirt"></i><div class="stat-number" id="totalProducts">0</div><div class="stat-label">Total SKU</div></div>
        <div class="stat-card"><i class="fas fa-cubes"></i><div class="stat-number" id="totalUnits">0</div><div class="stat-label">Total Units</div></div>
        <div class="stat-card"><i class="fas fa-exclamation-triangle"></i><div class="stat-number" id="lowStockCount">0</div><div class="stat-label">Low Stock (<25)</div></div>
    </div>

    <!-- filter categories matching your dress types -->
    <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-filter="all"><i class="fas fa-layer-group"></i> All Collection</button>
        <button class="filter-btn" data-filter="Frock Top"><i class="fas fa-female"></i> Frock Top</button>
        <button class="filter-btn" data-filter="Full Kit"><i class="fas fa-people-arrows"></i> Full Kit</button>
        <button class="filter-btn" data-filter="Long Dress"><i class="fas fa-dress"></i> Long Dress</button>
        <button class="filter-btn" data-filter="Short Dress"><i class="fas fa-child"></i> Short Dress</button>
    </div>

    <!-- product grid -->
    <div class="products-grid" id="productsGrid"></div>
    
    <footer>
        <div>© 2025 KaDo Clothing 🥑 — Wholesale Excellence</div>
        <div class="footer-wa">
            <i class="fab fa-whatsapp"></i> 
            <a href="https://chat.whatsapp.com/B7ahsbtptn714SlVZST99c" target="_blank">Join WhatsApp Community →</a>
        </div>
    </footer>
</div>

<script>
    // ---------- KADO CLOTHING PRODUCTS (FROCK TOP, FULL KIT, LONG DRESS, SHORT DRESS) ----------
    const products = [
        { id: 1, name: "Avocado Embroidery Frock Top", category: "Frock Top", stock: 126, image: "https://picsum.photos/id/20/400/300" },
        { id: 2, name: "Classic Linen Full Kit", category: "Full Kit", stock: 92, image: "https://picsum.photos/id/26/400/300" },
        { id: 3, name: "Rustic Floral Long Dress", category: "Long Dress", stock: 58, image: "https://picsum.photos/id/83/400/300" },
        { id: 4, name: "Chic Pleated Short Dress", category: "Short Dress", stock: 114, image: "https://picsum.photos/id/108/400/300" },
        { id: 5, name: "Ruffle Sleeve Frock Top", category: "Frock Top", stock: 42, image: "https://picsum.photos/id/36/400/300" },
        { id: 6, name: "Silk Blend Full Kit", category: "Full Kit", stock: 71, image: "https://picsum.photos/id/42/400/300" },
        { id: 7, name: "Velvet Maxi Long Dress", category: "Long Dress", stock: 19, image: "https://picsum.photos/id/101/400/300" },
        { id: 8, name: "Puff Sleeve Short Dress", category: "Short Dress", stock: 98, image: "https://picsum.photos/id/31/400/300" },
        { id: 9, name: "Off-Shoulder Frock Top", category: "Frock Top", stock: 14, image: "https://picsum.photos/id/82/400/300" },
        { id: 10, name: "Party Wear Full Kit", category: "Full Kit", stock: 47, image: "https://picsum.photos/id/96/400/300" },
        { id: 11, name: "Georgette Flowy Long Dress", category: "Long Dress", stock: 12, image: "https://picsum.photos/id/75/400/300" },
        { id: 12, name: "Denim Style Short Dress", category: "Short Dress", stock: 204, image: "https://picsum.photos/id/59/400/300" },
        { id: 13, name: "Abstract Print Frock Top", category: "Frock Top", stock: 37, image: "https://picsum.photos/id/24/400/300" },
        { id: 14, name: "Embroidered Full Kit", category: "Full Kit", stock: 63, image: "https://picsum.photos/id/106/400/300" }
    ];

    // Helper: update total stats
    function updateStats() {
        const totalSKU = products.length;
        const totalUnitsAll = products.reduce((sum, p) => sum + p.stock, 0);
        const lowStockAll = products.filter(p => p.stock < 25 && p.stock > 0).length;
        document.getElementById('totalProducts').innerText = totalSKU;
        document.getElementById('totalUnits').innerText = totalUnitsAll;
        document.getElementById('lowStockCount').innerText = lowStockAll;
    }

    let currentFilter = "all";
    const productsGrid = document.getElementById('productsGrid');

    // stock element with bar and dynamic class
    function getStockElement(stockCount) {
        let barWidth = Math.min(100, (stockCount / 200) * 100);
        if (stockCount > 200) barWidth = 100;
        let stockClass = "";
        let warningIcon = "";
        if (stockCount === 0) {
            stockClass = "out-stock";
            warningIcon = '<i class="fas fa-ban"></i>';
        } else if (stockCount < 25) {
            stockClass = "low-stock warning-pulse";
            warningIcon = '<i class="fas fa-exclamation-circle"></i>';
        } else {
            stockClass = "";
            warningIcon = '<i class="fas fa-check-circle"></i>';
        }
        return `
            <div class="stock-count">
                <i class="fas fa-boxes" style="color:#FFD966"></i>
                <span class="stock-value ${stockClass}">${warningIcon} ${stockCount} pcs</span>
                <div class="stock-bar-bg">
                    <div class="stock-bar-fill" style="width: ${barWidth}%;"></div>
                </div>
            </div>
        `;
    }

    function renderProducts() {
        let filtered = [];
        if (currentFilter === "all") {
            filtered = [...products];
        } else {
            filtered = products.filter(p => p.category === currentFilter);
        }

        if (filtered.length === 0) {
            productsGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem; background:rgba(0,0,0,0.6); border-radius:2rem; border:1px solid #FFD96640;">
                <i class="fas fa-egg" style="font-size:3rem; color:#FFD966"></i><br><br> No items in this category. <br> <span style="color:#FFD966">Explore our fresh collection 🥑</span>
            </div>`;
            updateStats();
            return;
        }

        let cardsHTML = "";
        filtered.forEach((product, idx) => {
            const stockCount = product.stock;
            let badgeExtra = "";
            if (stockCount === 0) badgeExtra = "out-stock";
            else if (stockCount < 25) badgeExtra = "low-stock";

            const stockDisplay = getStockElement(stockCount);
            cardsHTML += `
                <div class="product-card" style="animation-delay: ${idx * 0.03}s;">
                    <div class="img-container">
                        <img class="product-img" src="${product.image}" alt="${product.name}" loading="lazy">
                        <div class="stock-badge ${badgeExtra}">
                            <i class="fas fa-warehouse"></i> LIVE
                        </div>
                    </div>
                    <div class="product-info">
                        <div class="product-title">${product.name}</div>
                        <div class="product-category"><i class="fas fa-tag"></i> ${product.category}</div>
                        ${stockDisplay}
                    </div>
                </div>
            `;
        });
        productsGrid.innerHTML = cardsHTML;
        updateStats();
    }

    function setFilter(category) {
        currentFilter = category;
        renderProducts();
        document.querySelectorAll('.filter-btn').forEach(btn => {
            const btnVal = btn.getAttribute('data-filter');
            if (btnVal === category) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    // ---- SIMULATE REAL-TIME STOCK CHANGES (wholesale dynamics) ----
    function simulateStockUpdates() {
        setInterval(() => {
            const randomIndex = Math.floor(Math.random() * products.length);
            const product = products[randomIndex];
            // realistic fluctuation: between -8 and +12 units
            let change = Math.floor(Math.random() * 18) - 7;
            let newStock = product.stock + change;
            if (newStock < 0) newStock = 0;
            if (newStock > 380) newStock = 380;
            product.stock = newStock;

            const shouldRerender = (currentFilter === "all") || (currentFilter === product.category);
            if (shouldRerender) {
                renderProducts();
            } else {
                // update stats panel even without re-render if item hidden
                const totalUnitsAll = products.reduce((sum, p) => sum + p.stock, 0);
                const lowStockAll = products.filter(p => p.stock < 25 && p.stock > 0).length;
                document.getElementById('totalUnits').innerText = totalUnitsAll;
                document.getElementById('lowStockCount').innerText = lowStockAll;
            }
            // flash stats for live feel
            const totalSpan = document.getElementById('totalUnits');
            totalSpan.style.transform = 'scale(1.07)';
            setTimeout(() => { totalSpan.style.transform = ''; }, 200);
            const lowSpan = document.getElementById('lowStockCount');
            lowSpan.style.textShadow = '0 0 5px #FFD966';
            setTimeout(() => { lowSpan.style.textShadow = ''; }, 250);
        }, 9500);
    }

    // also update stock for low stock visual on demand
    window.addEventListener('DOMContentLoaded', () => {
        renderProducts();
        simulateStockUpdates();

        // attach filter listeners
        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const filterVal = btn.getAttribute('data-filter');
                setFilter(filterVal);
                btn.style.transform = 'scale(0.97)';
                setTimeout(() => { btn.style.transform = ''; }, 150);
            });
        });

        // small easter egg: click on logo shows avocado emoji
        const logo = document.querySelector('.hero h1');
        if(logo) {
            logo.addEventListener('click', () => {
                const avoMsg = document.createElement('div');
                avoMsg.innerText = '🥑 Fresh Wholesale Deals! 🥑';
                avoMsg.style.position = 'fixed';
                avoMsg.style.bottom = '20px';
                avoMsg.style.left = '50%';
                avoMsg.style.transform = 'translateX(-50%)';
                avoMsg.style.backgroundColor = '#FFD966';
                avoMsg.style.color = '#000';
                avoMsg.style.padding = '8px 20px';
                avoMsg.style.borderRadius = '40px';
                avoMsg.style.fontWeight = 'bold';
                avoMsg.style.zIndex = '999';
                avoMsg.style.backdropFilter = 'blur(8px)';
                document.body.appendChild(avoMsg);
                setTimeout(() => avoMsg.remove(), 2000);
            });
        }
    });
    
    // Expose quick stock manager for console fun
    window.KaDoStock = {
        restock: (id, newQty) => {
            const prod = products.find(p => p.id === id);
            if(prod) {
                prod.stock = Math.max(0, newQty);
                renderProducts();
                console.log(`✅ ${prod.name} stock updated to ${prod.stock}`);
            }
        },
        viewAll: () => console.table(products)
    };
</script>
</body>
</html>
