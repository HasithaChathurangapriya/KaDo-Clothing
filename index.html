        * {

        }

        body {
            background: #0a0a0a;
            font-family: 'Inter', sans-serif;
            color: #fff;
            scroll-behavior: smooth;
        }

        /* animated background with yellow accents */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 20% 30%, #0f0f0f 0%, #000000 100%);
        }

        .bg-gradient::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: repeating-linear-gradient(45deg, rgba(255,215,0,0.04) 0px, rgba(255,215,0,0.04) 2px, transparent 2px, transparent 12px);
            animation: drift 45s linear infinite;
            pointer-events: none;
        }

        @keyframes drift {
            0% { transform: translate(0,0) rotate(0deg);}
            100% { transform: translate(80px, 60px) rotate(6deg);}
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 2rem 3rem;
        }

        /* header with avocado branding */
        .hero {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeSlideDown 0.8s cubic-bezier(0.2, 0.9, 0.3, 1.1);
        }

        .hero h1 {
            font-size: 3.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #FFE174 0%, #FFC107 60%, #F9B81B 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .hero h1 i {
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: #FFD966;
            font-size: 3rem;
        }

        .tagline {
            font-size: 1.2rem;
            color: #e0e0e0;
            margin-top: 0.8rem;
            font-weight: 500;
            border-bottom: 1px solid rgba(255,215,0,0.4);
            display: inline-block;
            padding-bottom: 0.3rem;
        }

        /* WhatsApp banner CTA */
        .whatsapp-cta {
            background: linear-gradient(95deg, rgba(37, 211, 102, 0.2), rgba(0,0,0,0.7));
            backdrop-filter: blur(12px);
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            padding: 0.7rem 2rem;
            margin-top: 1.2rem;
            border: 1px solid rgba(37, 211, 102, 0.6);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .whatsapp-cta i {
            font-size: 1.8rem;
            color: #25D366;
        }
        
        .whatsapp-cta span {
            font-weight: 700;
            font-size: 1.1rem;
            color: white;
        }
        
        .whatsapp-cta small {
            font-size: 0.8rem;
            opacity: 0.8;
        }
        
        .whatsapp-cta:hover {
            transform: scale(1.02);
            background: rgba(37, 211, 102, 0.3);
            border-color: #25D366;
            box-shadow: 0 0 15px rgba(37,211,102,0.4);
        }

        /* product grid - full width without filters */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
            margin-top: 1rem;
        }

        .product-card {
            background: rgba(10,10,10,0.85);
            backdrop-filter: blur(5px);
            border-radius: 2rem;
            overflow: hidden;
            transition: all 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(255,255,255,0.08);
            transform: translateY(0);
            animation: cardReveal 0.55s ease backwards;
            cursor: pointer;
        }
        .product-card:hover {
            transform: translateY(-12px) scale(1.01);
            border-color: rgba(255,215,0,0.6);
            box-shadow: 0 28px 35px -12px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,215,0,0.25);
        }

        /* FULL IMAGE DISPLAY - No cropping, shows entire image */
        .img-container {
            width: 100%;
            height: 320px;
            overflow: hidden;
            background: #111;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .product-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* object-fit: contain shows the FULL image without any cropping */
            background: #0a0a0a;
            transition: transform 0.5s ease, filter 0.3s;
        }
        .product-card:hover .product-img {
            transform: scale(1.03);
            filter: brightness(1.02);
        }
        
        /* Fallback for images that might have white background */
        .img-container::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.2));
            pointer-events: none;
        }

        .stock-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            padding: 0.35rem 1rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.8rem;
            border-left: 3px solid #FFD966;
            color: #FFD966;
            z-index: 2;
        }
        .low-stock { color: #ffaa44; border-left-color: #ffaa44; }
        .out-stock { color: #ff8888; border-left-color: #ff8888; }

        .product-info {
            padding: 1.2rem 1.2rem 1.5rem;
        }
        .product-title {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.3px;
            color: #fff;
            margin-bottom: 0.3rem;
            line-height: 1.3;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .product-title .emoji {
            font-size: 1.5rem;
        }
        
        /* Price styling - prominent yellow */
        .product-price {
            display: inline-block;
            background: rgba(255,215,0,0.2);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 1.25rem;
            font-weight: 800;
            color: #FFD966;
            margin: 0.5rem 0 0.6rem;
            letter-spacing: 0.5px;
        }
        
        .product-price i {
            margin-right: 6px;
            font-size: 0.9rem;
        }
        
        .product-category {
            display: inline-block;
            background: rgba(255,215,0,0.12);
            padding: 0.2rem 0.9rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #FFD966;
            margin-right: 0.5rem;
        }
        
        /* Product details extra info (fabric, sizes) */
        .product-details {
            margin: 0.6rem 0 0.5rem;
            padding: 0.4rem 0;
            border-top: 1px dashed rgba(255,215,0,0.2);
            border-bottom: 1px dashed rgba(255,215,0,0.2);
            font-size: 0.75rem;
            color: #ccc;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .product-details span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .product-details i {
            color: #FFD966;
            font-size: 0.7rem;
        }
        
        .stock-count {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: rgba(255,255,255,0.03);
            padding: 0.7rem 0.8rem;
            border-radius: 1rem;
            font-weight: 600;
            margin-top: 0.8rem;
        }
        .stock-value {
            font-size: 1rem;
            color: #FFD966;
            font-weight: 800;
        }
        .stock-bar-bg {
            flex: 1;
            height: 6px;
            background: #2c2c2c;
            border-radius: 10px;
            overflow: hidden;
        }
        .stock-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #FFD966, #f7b42c);
            border-radius: 10px;
            transition: width 0.5s ease-out;
        }
        
        /* Wholesale note */
        .wholesale-note {
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 0.6rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* animations */
        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-35px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulseYellow {
            0% { text-shadow: 0 0 0px rgba(255,217,102,0);}
            50% { text-shadow: 0 0 6px rgba(255,217,102,0.6);}
            100% { text-shadow: 0 0 0px rgba(255,217,102,0);}
        }
        .warning-pulse {
            animation: pulseYellow 1.2s infinite;

        footer {

            font-size: 0.8rem;
            color: #aaa;
            border-top: 1px solid rgba(255,215,0,0.2);

        .footer-wa {

        }
        .footer-wa a {
            color: #25D366;

        }

        @media (max-width: 700px) {
            .container { padding: 1rem; }
            .hero h1 { font-size: 2.2rem; }
            .hero h1 i { font-size: 2rem; }
            .product-price { font-size: 1.1rem; }
            .product-title { font-size: 1.2rem; }
            .img-container { height: 280px; }
        }
    </style>
</head>

    const productsGrid = document.getElementById('productsGrid');

    // Helper: Generate stock element with bar and dynamic class (shows stock count)
    function getStockElement(stockCount) {
        let barWidth = Math.min(100, (stockCount / 200) * 100);
        if (stockCount > 200) barWidth = 100;
        let stockClass = "";
        let warningIcon = "";
        if (stockCount === 0) {
            stockClass = "out-stock";
            warningIcon = '<i class="fas fa-ban"></i>';
        } else if (stockCount < 25) {
            stockClass = "low-stock warning-pulse";
            warningIcon = '<i class="fas fa-exclamation-circle"></i>';
        } else {
            stockClass = "";
            warningIcon = '<i class="fas fa-check-circle"></i>';
        }
        return `
            <div class="stock-count">
                <i class="fas fa-boxes" style="color:#FFD966"></i>
                <span class="stock-value ${stockClass}">${warningIcon} ${stockCount} pieces</span>
                <div class="stock-bar-bg">
                    <div class="stock-bar-fill" style="width: ${barWidth}%;"></div>
                </div>
            </div>
        `;
    }

    function renderProducts() {
        if (products.length === 0) {
            productsGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:3rem; background:rgba(0,0,0,0.6); border-radius:2rem; border:1px solid #FFD96640;">
                <i class="fas fa-egg" style="font-size:3rem; color:#FFD966"></i><br><br> Fresh collection coming soon! 🥑
            </div>`;
            return;
        }

        let cardsHTML = "";
        products.forEach((product, idx) => {
            const stockCount = product.stock;
            let badgeExtra = "";
            if (stockCount === 0) badgeExtra = "out-stock";
            else if (stockCount < 25) badgeExtra = "low-stock";

            const stockDisplay = getStockElement(stockCount);
            const emojiDisplay = product.emoji ? `<span class="emoji">${product.emoji}</span>` : '';
            
            // Build details section (fabric & sizes)
            let detailsHTML = '';
            if (product.fabric || product.sizes) {
                detailsHTML = `<div class="product-details">`;
                if (product.fabric) {
                    detailsHTML += `<span><i class="fas fa-tshirt"></i> ${product.fabric}</span>`;
                }
                if (product.sizes) {
                    detailsHTML += `<span><i class="fas fa-ruler-combined"></i> Sizes: ${product.sizes}</span>`;
                }
                detailsHTML += `</div>`;
            }
            
            cardsHTML += `
                <div class="product-card" style="animation-delay: ${idx * 0.02}s;">
                    <div class="img-container">
                        <img class="product-img" src="${product.image}" alt="${product.name}" loading="lazy" onerror="this.src='https://placehold.co/800x1000/1a1a1a/FFD966?text=KaDo+Clothing'">
                        <div class="stock-badge ${badgeExtra}">
                            <i class="fas fa-warehouse"></i> LIVE STOCK
                        </div>
                    </div>
                    <div class="product-info">
                        <div class="product-title">
                            ${emojiDisplay} ${product.name}
                        </div>
                        <div class="product-price">
                            <i class="fas fa-tag"></i> ${product.price} <span style="font-size:0.7rem;">/ wholesale (per piece)</span>
                        </div>
                        <div class="product-category"><i class="fas fa-layer-group"></i> ${product.category}</div>
                        ${detailsHTML}
                        ${stockDisplay}
                        <div class="wholesale-note">
                            <i class="fas fa-truck-fast"></i> Bulk discounts available • Min order 6 pieces
                        </div>
                    </div>
                </div>
            `;
        });
        productsGrid.innerHTML = cardsHTML;
    }

    // ---- SIMULATE REAL-TIME STOCK CHANGES (wholesale dynamics) to show live inventory updates ----
    function simulateStockUpdates() {
        setInterval(() => {
            const randomIndex = Math.floor(Math.random() * products.length);
            const product = products[randomIndex];
            // realistic fluctuation: between -7 and +11 units to reflect orders & restocks
            let change = Math.floor(Math.random() * 16) - 6; // -6 to +9
            let newStock = product.stock + change;
            if (newStock < 0) newStock = 0;
            if (newStock > 380) newStock = 380;
            product.stock = newStock;
            
            // re-render to update stock display and progress bar
            renderProducts();
            
            // Optional: add a small visual notification for stock change (subtle)
            const cards = document.querySelectorAll('.product-card');
            if (cards[randomIndex]) {
                cards[randomIndex].style.transform = 'scale(1.01)';
                setTimeout(() => {
                    if (cards[randomIndex]) cards[randomIndex].style.transform = '';
                }, 200);
            }
        }, 9000);
    }

    // Initialize everything when DOM ready
    window.addEventListener('DOMContentLoaded', () => {
        renderProducts();
        simulateStockUpdates();
        
        // Small avocado easter egg: click on logo shows fresh message
        const logo = document.querySelector('.hero h1');
        if(logo) {
            logo.addEventListener('click', () => {
                const avoMsg = document.createElement('div');
                avoMsg.innerText = '🥑 Fresh Wholesale Stock & Best Prices! 🥑';
                avoMsg.style.position = 'fixed';
                avoMsg.style.bottom = '20px';
                avoMsg.style.left = '50%';
                avoMsg.style.transform = 'translateX(-50%)';
                avoMsg.style.backgroundColor = '#FFD966';
                avoMsg.style.color = '#000';
                avoMsg.style.padding = '10px 24px';
                avoMsg.style.borderRadius = '40px';
                avoMsg.style.fontWeight = 'bold';
                avoMsg.style.zIndex = '999';
                avoMsg.style.backdropFilter = 'blur(8px)';
                avoMsg.style.fontSize = '0.9rem';
                avoMsg.style.boxShadow = '0 4px 15px rgba(0,0,0,0.3)';
                document.body.appendChild(avoMsg);
                setTimeout(() => avoMsg.remove(), 2200);
            });
        }
        
        // Highlight the crop top with a gentle pulse effect on load
        setTimeout(() => {
            const firstCard = document.querySelector('.product-card');
            if (firstCard) {
                firstCard.style.transition = '0.3s';
                firstCard.style.boxShadow = '0 0 20px rgba(255,215,0,0.5)';
                setTimeout(() => {
                    if (firstCard) firstCard.style.boxShadow = '';

            const prod = products.find(p => p.id === id);
            if(prod) {
                prod.stock = Math.max(0, newQty);
                renderProducts();
                console.log(`✅ ${prod.name} stock updated to ${prod.stock} | Price: ${prod.price}`);
                return true;
            }
            console.warn(`Product with id ${id} not found`);
            return false;
        },
        viewInventory: () => console.table(products.map(p => ({ name: p.name, price: p.price, stock: p.stock, fabric: p.fabric, sizes: p.sizes }))),
        addProduct: (newProduct) => {
            if(newProduct.name && newProduct.price && newProduct.stock !== undefined) {
                const newId = products.length + 1;
                products.push({
                    id: newId,
                    name: newProduct.name,
                    emoji: newProduct.emoji || "👕",
                    category: newProduct.category || "Frock Top",
                    price: newProduct.price,
                    stock: newProduct.stock,
                    image: newProduct.image || "https://images.pexels.com/photos/1082529/pexels-photo-1082529.jpeg?auto=compress&cs=tinysrgb&w=800",
                    fabric: newProduct.fabric || "Premium fabric",
                    sizes: newProduct.sizes || "S to XL"
                });
                renderProducts();
                console.log(`✅ New product added: ${newProduct.name}`);
            }
        }
    };
</script>
</body>
</html>
